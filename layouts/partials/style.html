<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0a0a0b;
    --bg-2: #111114;
    --surface: #14161b;
    --surface-2: #1a1d23;
    --border: #23262d;
    --border-hover: #353943;
    --text: #e8e9eb;
    --text-dim: #a1a4ad;
    --text-muted: #6b6f78;
    --accent: #ff7a59;
    --accent-dim: rgba(255, 122, 89, 0.12);
    --accent-line: rgba(255, 122, 89, 0.35);
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
    --sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
    --max-w: 780px;
  }

  * {
    box-sizing: border-box;
  }

  html {
    background-color: var(--bg);
  }

  body {
    font-family: var(--sans);
    margin: 0 auto;
    padding: 48px 24px 80px;
    max-width: var(--max-w);
    text-align: left;
    background-color: var(--bg);
    color: var(--text-dim);
    word-wrap: break-word;
    overflow-wrap: break-word;
    line-height: 1.65;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  h1, h2, h3, h4, h5, h6 {
    color: var(--text);
    font-weight: 600;
    letter-spacing: -0.01em;
    line-height: 1.3;
    margin-top: 2em;
    margin-bottom: 0.6em;
  }

  h1 { font-size: 1.8rem; letter-spacing: -0.02em; }
  h2 { font-size: 1.35rem; }
  h3 { font-size: 1.1rem; }

  strong, b { color: var(--text); font-weight: 600; }

  p {
    margin: 0.9em 0;
  }

  a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid var(--accent-line);
    transition: color 0.15s ease, border-color 0.15s ease;
  }

  a:hover {
    color: var(--text);
    border-bottom-color: var(--text);
  }

  hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 2.5em 0;
  }

  code {
    font-family: var(--mono);
    font-size: 0.88em;
    padding: 2px 6px;
    background-color: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
  }

  pre code {
    display: block;
    padding: 18px;
    white-space: pre-wrap;
    font-size: 13px;
    line-height: 1.6;
    overflow-x: auto;
    border-radius: var(--radius-sm);
  }

  blockquote {
    border-left: 2px solid var(--accent);
    color: var(--text-dim);
    padding: 0.2em 0 0.2em 1.2em;
    margin: 1.5em 0;
    font-style: italic;
  }

  img {
    max-width: 100%;
    border-radius: var(--radius-sm);
  }

  ul, ol {
    padding-left: 1.3em;
  }

  li {
    margin: 0.35em 0;
  }

  /* ===== Header / Nav ===== */
  header {
    max-width: var(--max-w);
    margin: 0 auto 40px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }

  .site-title {
    font-family: var(--mono);
    font-size: 0.95rem;
    color: var(--text);
    font-weight: 600;
    text-decoration: none;
    border: none;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }

  .site-title:hover { color: var(--accent); border: none; }

  .site-title .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    display: inline-block;
  }

  nav {
    display: flex;
    gap: 20px;
    font-family: var(--mono);
    font-size: 0.85rem;
  }

  nav a {
    color: var(--text-dim);
    border: none;
    text-transform: lowercase;
  }

  nav a:hover { color: var(--accent); border: none; }

  /* ===== Main ===== */
  main {
    max-width: var(--max-w);
    margin: 0 auto;
  }

  /* ===== Footer ===== */
  footer {
    max-width: var(--max-w);
    margin: 80px auto 0;
    padding-top: 28px;
    border-top: 1px solid var(--border);
    text-align: left;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.8rem;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }

  footer a {
    color: var(--text-muted);
    border: none;
  }

  footer a:hover { color: var(--accent); }

  /* ===== Home page sections ===== */
  .hero {
    margin: 0 0 48px;
  }

  .hero-badge {
    display: inline-block;
    font-family: var(--mono);
    font-size: 0.75rem;
    color: var(--accent);
    background: var(--accent-dim);
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 20px;
    letter-spacing: 0.02em;
  }

  .hero h1 {
    font-size: 2.2rem;
    margin-top: 0;
    margin-bottom: 16px;
    color: var(--text);
  }

  .hero p {
    font-size: 1.05rem;
    color: var(--text-dim);
    max-width: 640px;
  }

  .section {
    margin: 44px 0;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .section-title::before {
    content: "";
    width: 18px;
    height: 1px;
    background: var(--text-muted);
    display: inline-block;
  }

  .socials-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .socials-list li::before {
    content: "→ ";
    color: var(--text-muted);
    font-family: var(--mono);
  }

  /* ===== Projects page ===== */
  .intro-lead {
    font-size: 1.02rem;
    color: var(--text-dim);
    margin: 0 0 40px;
    padding: 18px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 2px solid var(--accent);
    border-radius: var(--radius-sm);
  }

  .intro-lead p { margin: 0; }

  .section-heading {
    font-family: var(--mono);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    margin-top: 48px;
    margin-bottom: 18px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .section-heading::before {
    content: "";
    width: 22px;
    height: 1px;
    background: var(--accent);
    display: inline-block;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
    margin: 0 0 8px;
  }

  .project-card {
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    color: var(--text-dim);
    text-decoration: none !important;
    transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    position: relative;
    overflow: hidden;
  }

  a.project-card {
    cursor: pointer;
  }

  a.project-card:hover {
    border-color: var(--accent);
    background: var(--surface-2);
    transform: translateY(-2px);
    color: var(--text-dim);
  }

  a.project-card:hover .project-name {
    color: var(--accent);
  }

  .project-card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
  }

  .project-name {
    font-family: var(--sans);
    font-size: 1.02rem;
    color: var(--text);
    margin: 0;
    font-weight: 600;
    transition: color 0.18s ease;
  }

  .project-badge {
    font-family: var(--mono);
    font-size: 0.64rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 999px;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .project-badge.live { color: #4ade80; border-color: rgba(74, 222, 128, 0.3); }
  .project-badge.win { color: #fbbf24; border-color: rgba(251, 191, 36, 0.3); }
  .project-badge.finalist { color: #a78bfa; border-color: rgba(167, 139, 250, 0.3); }

  .project-tagline {
    font-size: 0.875rem;
    line-height: 1.55;
    color: var(--text-dim);
    margin: 0 0 14px;
    flex-grow: 1;
  }

  .project-stack {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: auto;
  }

  .project-stack span {
    font-family: var(--mono);
    font-size: 0.68rem;
    color: var(--text-muted);
    padding: 2px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
  }

  /* ===== Blog list ===== */
  ul.blog-posts {
    list-style: none;
    padding: 0;
    margin: 20px 0 0;
  }

  ul.blog-posts li {
    display: flex;
    align-items: baseline;
    gap: 18px;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }

  ul.blog-posts li:last-child { border-bottom: none; }

  ul.blog-posts li span {
    flex: 0 0 110px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.78rem;
  }

  ul.blog-posts li span i { font-style: normal; }

  ul.blog-posts li a {
    color: var(--text);
    border: none;
    font-size: 0.98rem;
    flex: 1;
  }

  ul.blog-posts li a:hover { color: var(--accent); }

  /* ===== Single post ===== */
  content {
    display: block;
    line-height: 1.75;
  }

  content h1:first-child,
  main > h1:first-of-type {
    margin-top: 0;
  }

  /* ===== Responsive ===== */
  @media (max-width: 600px) {
    body { padding: 32px 18px 60px; font-size: 14.5px; }
    header { margin-bottom: 32px; }
    .hero h1 { font-size: 1.7rem; }
    .projects-grid { grid-template-columns: 1fr; }
    ul.blog-posts li {
      flex-direction: column;
      gap: 4px;
    }
    ul.blog-posts li span { flex: none; }
    footer { flex-direction: column; }
  }

  /* Make selection color match accent */
  ::selection {
    background: var(--accent-dim);
    color: var(--text);
  }
</style>
